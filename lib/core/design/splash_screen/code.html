<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>صحتي - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&amp;family=Manrope:wght@500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#eff0fa",
                    "tertiary": "#924700",
                    "on-primary-container": "#fefcff",
                    "surface-container-high": "#e6e7f2",
                    "primary-fixed": "#d8e2ff",
                    "on-tertiary-container": "#fffbff",
                    "status-taken-bg": "#D1FAE5",
                    "text-primary": "#1E293B",
                    "inverse-primary": "#adc6ff",
                    "on-tertiary-fixed": "#311400",
                    "on-error": "#ffffff",
                    "error": "#ba1a1a",
                    "status-upcoming-text": "#1E40AF",
                    "inverse-surface": "#2e3038",
                    "secondary": "#006c49",
                    "status-upcoming-bg": "#DBEAFE",
                    "surface": "#FFFFFF",
                    "primary-container": "#2170e4",
                    "on-surface": "#191b23",
                    "surface-container-highest": "#e1e2ec",
                    "on-surface-variant": "#424754",
                    "on-secondary-fixed-variant": "#005236",
                    "danger": "#EF4444",
                    "on-background": "#191b23",
                    "secondary-fixed": "#6ffbbe",
                    "secondary-fixed-dim": "#4edea3",
                    "surface-variant": "#e1e2ec",
                    "status-taken-text": "#065F46",
                    "outline-variant": "#c2c6d6",
                    "on-secondary-container": "#00714d",
                    "surface-bright": "#f9f9ff",
                    "primary-fixed-dim": "#adc6ff",
                    "dark-border": "#334155",
                    "on-secondary": "#ffffff",
                    "background": "#F8FAFC",
                    "surface-container": "#ecedf7",
                    "tertiary-fixed-dim": "#ffb786",
                    "border": "#E2E8F0",
                    "status-missed-text": "#991B1B",
                    "surface-dim": "#d8d9e3",
                    "primary": "#0058be",
                    "secondary-container": "#6cf8bb",
                    "on-error-container": "#93000a",
                    "dark-surface": "#1E293B",
                    "dark-text": "#F1F5F9",
                    "on-tertiary": "#ffffff",
                    "text-secondary": "#64748B",
                    "surface-tint": "#005ac2",
                    "on-tertiary-fixed-variant": "#723600",
                    "on-secondary-fixed": "#002113",
                    "status-missed-bg": "#FEE2E2",
                    "tertiary-container": "#b75b00",
                    "warning": "#F59E0B",
                    "on-primary-fixed": "#001a42",
                    "on-primary-fixed-variant": "#004395",
                    "dark-background": "#0F172A",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f2f3fd",
                    "tertiary-fixed": "#ffdcc6",
                    "error-container": "#ffdad6",
                    "outline": "#727785"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "card-padding": "16px",
                    "gap": "12px",
                    "base": "8px",
                    "screen-edge": "20px"
            },
            "fontFamily": {
                    "h2": ["Cairo"],
                    "caption": ["Cairo"],
                    "body": ["Cairo"],
                    "h1": ["Cairo"],
                    "h3": ["Cairo"],
                    "manrope": ["Manrope"]
            },
            "fontSize": {
                    "h2": ["22px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "caption": ["13px", {"lineHeight": "1.4", "fontWeight": "400"}],
                    "body": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "h1": ["28px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "h3": ["18px", {"lineHeight": "1.4", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .splash-gradient {
            background: radial-gradient(circle at center, #EBF3FF 0%, #FFFFFF 100%);
        }
        .logo-glow {
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-text-primary antialiased">
<!-- Splash Screen Container -->
<main class="min-h-screen flex flex-col items-center justify-center splash-gradient relative overflow-hidden">
<!-- Abstract Decorative Elements (Bento-inspired Background) -->
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-secondary/5 rounded-full blur-3xl"></div>
<!-- Central Content Brand Area -->
<div class="flex flex-col items-center justify-center z-10 space-y-8">
<!-- Logo Icon Container -->
<div class="w-32 h-32 bg-white rounded-[2rem] flex items-center justify-center logo-glow border border-white/50 relative">
<div class="absolute inset-0 bg-primary/5 rounded-[2rem] blur-sm"></div>
<div class="relative flex items-center justify-center">
<!-- Material Icon: medication (Pill/Medical) -->
<span class="material-symbols-outlined text-primary text-[64px]" data-icon="medication">
                        medication
                    </span>
<!-- Secondary Icon Overlay: medical_services (Cross) -->
<div class="absolute -top-1 -right-1 bg-primary text-white p-1 rounded-lg">
<span class="material-symbols-outlined text-[18px]" data-icon="medical_services" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                            medical_services
                        </span>
</div>
</div>
</div>
<!-- Brand Identity -->
<div class="text-center space-y-3">
<h1 class="font-h1 text-[42px] text-primary tracking-tight">
                    صحتي
                </h1>
<p class="font-h3 text-text-secondary opacity-80 font-medium">
                    صحتك في يدك
                </p>
</div>
</div>
<!-- Bottom Branding/Affiliate (Optional but adds quality) -->
<div class="absolute bottom-12 flex flex-col items-center space-y-4">
<div class="flex items-center space-y-1 flex-col">
<span class="text-caption text-text-secondary uppercase tracking-[0.2em] font-manrope font-bold">
                    Powered by DoseTrack
                </span>
<div class="flex gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-primary/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/30"></div>
</div>
</div>
</div>
<!-- High-end Glassmorphic Overlay for Depth -->
<div class="absolute inset-0 pointer-events-none border-[16px] border-white/20 rounded-[40px] m-4"></div>
</main>
<!-- Illustrative Medical Pattern Background Layer (Subtle) -->
<div class="fixed inset-0 opacity-[0.03] pointer-events-none z-0 overflow-hidden select-none">
<div class="grid grid-cols-4 gap-24 rotate-12 scale-150">
<span class="material-symbols-outlined text-9xl" data-icon="health_metrics">health_metrics</span>
<span class="material-symbols-outlined text-9xl" data-icon="ecg_heart">ecg_heart</span>
<span class="material-symbols-outlined text-9xl" data-icon="vaccines">vaccines</span>
<span class="material-symbols-outlined text-9xl" data-icon="pill">pill</span>
<span class="material-symbols-outlined text-9xl" data-icon="clinical_notes">clinical_notes</span>
<span class="material-symbols-outlined text-9xl" data-icon="monitor_heart">monitor_heart</span>
<span class="material-symbols-outlined text-9xl" data-icon="fluid_med">fluid_med</span>
<span class="material-symbols-outlined text-9xl" data-icon="medical_information">medical_information</span>
</div>
</div>
</body></html>
